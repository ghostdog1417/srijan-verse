<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <title>SrijanVerse</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Buffer polyfill for browser: provides minimal API expected by
      // music-metadata-browser (from, alloc, allocUnsafe, concat, isBuffer,
      // and a toString implementation).
      if (typeof globalThis.Buffer === 'undefined') {
        (function () {
          function BufferPoly () {}

          BufferPoly.from = function (input, encoding) {
            let u
            if (typeof input === 'number') u = new Uint8Array(input)
            else if (typeof input === 'string') u = new TextEncoder().encode(input)
            else if (ArrayBuffer.isView(input)) u = new Uint8Array(input.buffer, input.byteOffset, input.byteLength)
            else if (input instanceof ArrayBuffer) u = new Uint8Array(input)
            else if (Array.isArray(input)) u = new Uint8Array(input)
            else u = new Uint8Array([])

            Object.setPrototypeOf(u, BufferPoly.prototype)
            return u
          }

          BufferPoly.alloc = function (size, fill = 0) {
            const u = new Uint8Array(size)
            if (fill) u.fill(fill)
            Object.setPrototypeOf(u, BufferPoly.prototype)
            return u
          }

          BufferPoly.allocUnsafe = BufferPoly.alloc

          BufferPoly.isBuffer = function (x) {
            return x && x.buffer instanceof ArrayBuffer
          }

          BufferPoly.concat = function (list) {
            const len = list.reduce((s, l) => s + (l?.length || 0), 0)
            const out = new Uint8Array(len)
            let offset = 0
            for (const l of list) {
              out.set(l, offset)
              offset += l.length
            }
            Object.setPrototypeOf(out, BufferPoly.prototype)
            return out
          }

          BufferPoly.prototype.toString = function (encoding, start = 0, end = this.length) {
            const slice = this.subarray(start, end)
            if (!encoding || /utf-?8/i.test(encoding)) return new TextDecoder('utf-8').decode(slice)
            if (/latin1|binary/i.test(encoding)) return String.fromCharCode.apply(null, slice)
            return new TextDecoder(encoding).decode(slice)
          }

          globalThis.Buffer = BufferPoly
        })()
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
